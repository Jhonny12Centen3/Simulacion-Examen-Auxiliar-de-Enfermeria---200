let quizData = [];
let currentIdx = 0;
let score = 0;
let answered = false;

function init() {
    quizData = [...masterDB].sort(() => Math.random() - 0.5);
    showQuestion();
}

function showQuestion() {
    if (currentIdx >= 200) { finish(); return; }
    
    answered = false;
    const q = quizData[currentIdx];
    document.getElementById('q-idx').innerText = currentIdx + 1;
    document.getElementById('q-text').innerText = q.q;
    document.getElementById('q-feedback').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
    
    const optsDiv = document.getElementById('q-options');
    optsDiv.innerHTML = '';
    
    let shuffledOpts = [...q.o].sort(() => Math.random() - 0.5);
    shuffledOpts.forEach(text => {
        const btn = document.createElement('button');
        btn.className = 'opt-btn';
        btn.innerText = text;
        btn.onclick = () => check(btn, text, q.a, q.r);
        optsDiv.appendChild(btn);
    });
    
    document.getElementById('progress-fill').style.width = (currentIdx / 200 * 100) + "%";
}

function check(btn, selected, correct, feedback) {
    if (answered) return;
    answered = true;
    
    const allBtns = document.querySelectorAll('.opt-btn');
    if (selected === correct) {
        btn.classList.add('correct');
        score++;
        document.getElementById('q-score').innerText = score;
    } else {
        btn.classList.add('wrong');
        allBtns.forEach(b => { if(b.innerText === correct) b.classList.add('correct'); });
    }
    
    const fDiv = document.getElementById('q-feedback');
    fDiv.innerHTML = "<strong>Explicación:</strong> " + feedback;
    fDiv.style.display = 'block';
    document.getElementById('next-btn').style.display = 'block';
}

function handleNext() {
    currentIdx++;
    showQuestion();
}

function finish() {
    const finalPct = Math.round((score / 200) * 100);
    document.getElementById('quiz-content').innerHTML = `
        <div style="text-align:center; padding:30px;">
            <h2 style="font-size:2.5rem;">¡REPASO FINALIZADO!</h2>
            <p style="font-size:1.2rem;">Has revisado las 200 preguntas de tu temario.</p>
            <div style="font-size:5rem; color:var(--blue); margin:20px 0;">${finalPct}%</div>
            <p style="font-size:1.2rem;">Aciertos: ${score} de 200</p>
            <button onclick="location.reload()" style="padding:20px; background:var(--success); color:white; border:none; border-radius:10px; cursor:pointer; font-size:1.1rem; width:100%;">Volver a Empezar (Barajar)</button>
        </div>
    `;
}

window.onload = init;
</script>
